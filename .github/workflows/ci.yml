name: CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: 20
      - run: npm install
      - run: npm test
      - name: Start API in background
        run: npx tsx index.ts &
      - name: Wait for API to be ready
        run: sleep 5 && curl --retry 10 --retry-delay 2 --retry-connrefused http://localhost:3000/api/health
      - name: Run OWASP ZAP baseline scan
        run: |
          HOST_IP=$(hostname -I | awk '{print $1}')
          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          PROJECT_NAME=$(node -p "require('./package.json').name")
          REPORT="${PROJECT_NAME}_zap-report_${TIMESTAMP}.html"
          docker run -t -v $(pwd):/zap/wrk:rw ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t http://$HOST_IP:3000 -r $REPORT
          sed -i "s|<title>ZAP Scanning Report</title>|<title>${PROJECT_NAME} - ZAP Security Report</title>|g" $REPORT
          echo "ZAP report saved as $REPORT"