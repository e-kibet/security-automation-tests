name: CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: 20
      - run: npm install
      - run: npm test
      - name: Start API in background
        run: npx tsx index.ts &
      - name: Wait for API to be ready
        run: sleep 5 && curl --retry 10 --retry-delay 2 --retry-connrefused http://localhost:3000/api/health
      - name: Run OWASP ZAP baseline scan
        run: |
          HOST_IP=$(hostname -I | awk '{print $1}')
          docker run -t -v $(pwd):/zap/wrk:rw ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t http://$HOST_IP:3000 -r zap-report.html